# ============================================================
#  WolfISMS-Stack – Betrieb hinter dem NPM-Container (gemeinsames Netz)
#  Kein veröffentlichter App-Port. NPM erreicht die App über ${PROXY_ALIAS}.
#  Lizenz: pro Umgebung eigene ./license/customer.lic (nicht im Image!).
# ============================================================
services:

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - default
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    image: ${WOLFISMS_IMAGE:-wolfschuster/wolfisms:release}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      WOLFISMS_CONTAINER: "1"
    volumes:
      # Lizenz dieser Umgebung (eigene Datei je Stack, überschreibt Image):
      - ./license/customer.lic:/var/www/isms/license/customer.lic:rw
    networks:
      default: {}
      proxy:
        aliases:
          - ${PROXY_ALIAS:?PROXY_ALIAS fehlt in der .env}

  cron:
    image: ${WOLFISMS_IMAGE:-wolfschuster/wolfisms:release}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      WOLFISMS_CONTAINER: "1"
    volumes:
      - ./license/customer.lic:/var/www/isms/license/customer.lic:ro
    entrypoint: ["/usr/local/bin/wolfisms-cron-entry.sh"]
    command: []
    networks:
      - default
    healthcheck:
      disable: true

networks:
  default:
  proxy:
    external: true
    name: proxy

volumes:
  db_data:
